<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tabela Completa Raspadinhas | Calculadora EV</title>
  <meta name="description" content="Tabela completa com o Valor Esperado (EV) de todas as raspadinhas portuguesas. Compare retorno, odds e probabilidades antes e depois de impostos.">
  <meta name="keywords" content="raspadinhas, valor esperado, EV, tabela, Santa Casa, scratch tickets, Portugal, odds, retorno">
  <link rel="canonical" href="https://eeriegoesd.com/scratch-ev/tabela-raspadinhas.html">
  <meta property="og:title" content="Tabela Completa Raspadinhas | Calculadora EV">
  <meta property="og:description" content="Tabela completa com o Valor Esperado de todas as raspadinhas portuguesas. Compare retorno, odds e probabilidades.">
  <meta property="og:image" content="https://eeriegoesd.com/scratch-ev/og-image.png">
  <meta property="og:url" content="https://eeriegoesd.com/scratch-ev/tabela-raspadinhas.html">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="pt_PT">
  <meta property="og:locale:alternate" content="en_US">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Tabela Completa Raspadinhas | Calculadora EV">
  <meta name="twitter:description" content="Tabela completa com o Valor Esperado de todas as raspadinhas portuguesas.">
  <meta name="twitter:image" content="https://eeriegoesd.com/scratch-ev/og-image.png">
  <meta name="author" content="EERIE">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a3a;
      --accent: #ff6b2b;
      --accent2: #ff9a5c;
      --text: #e8e8f0;
      --muted: #6b6b88;
      --success: #3de68e;
      --danger: #ff5555;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--accent);
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
      align-items: flex-end;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .control-group label {
      font-size: 0.8rem;
      color: var(--muted);
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .control-group input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.9rem;
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      width: 130px;
      outline: none;
      transition: border-color 0.2s;
    }

    .control-group input:focus {
      border-color: var(--accent);
    }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: var(--sans);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.5rem 1.2rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      height: fit-content;
      align-self: flex-end;
    }

    button:hover {
      background: var(--accent2);
    }

    button.secondary {
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    button.secondary:hover {
      background: var(--border);
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
      font-family: var(--mono);
      white-space: nowrap;
    }

    thead {
      background: var(--surface2);
      position: sticky;
      top: 0;
      z-index: 2;
    }

    th {
      padding: 0.7rem 0.6rem;
      text-align: right;
      color: var(--muted);
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      border-bottom: 2px solid var(--border);
      transition: color 0.2s;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    th:first-child {
      text-align: left;
    }

    th:hover {
      color: var(--accent);
    }

    th .sort-arrow {
      font-size: 0.65rem;
      margin-left: 0.2rem;
    }

    td {
      padding: 0.55rem 0.6rem;
      text-align: right;
      border-bottom: 1px solid var(--border);
    }

    td:first-child {
      text-align: left;
      color: var(--text);
      font-weight: 600;
    }

    tr:hover td {
      background: var(--surface2);
    }

    tr.highlight td {
      background: rgba(255, 107, 43, 0.1);
      border-bottom-color: var(--accent);
    }

    tr.highlight td:first-child {
      color: var(--accent);
    }

    .positive {
      color: var(--success);
    }

    .negative {
      color: var(--danger);
    }

    .loading {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted);
      font-family: var(--mono);
    }

    .loading .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    footer {
      margin-top: 3rem;
      padding: 1.5rem 0;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      justify-content: center;
      align-items: center;
      font-size: 0.85rem;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover {
      color: var(--accent2);
    }

    footer .sep {
      color: var(--border);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
    }

    @media (max-width: 768px) {
      .container {
        padding: 1rem 0.5rem;
      }
      h1 {
        font-size: 1.3rem;
      }
      .controls {
        gap: 0.6rem;
      }
      .control-group input {
        width: 100px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="page-title">Tabela Completa de Raspadinhas</h1>
    <p class="subtitle" id="page-subtitle">Valor esperado e probabilidades de todas as raspadinhas portuguesas</p>

    <div class="controls">
      <div class="control-group">
        <label id="lbl-tax-rate">Taxa Imposto (%)</label>
        <input type="number" id="tax-rate" value="20" min="0" max="100" step="1">
      </div>
      <div class="control-group">
        <label id="lbl-tax-thresh">Limiar Imposto (&euro;)</label>
        <input type="number" id="tax-thresh" value="5000" min="0" step="100">
      </div>
      <div class="control-group">
        <label id="lbl-target">&gt;= Pr&eacute;mio Alvo (&euro;)</label>
        <input type="number" id="target-prize" value="0" min="0" step="1">
      </div>
      <button id="btn-filter" onclick="recalculate()">Filtrar</button>
      <button class="secondary" id="btn-csv" onclick="exportCSV()">CSV</button>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <div id="loading-text">A carregar dados dos jogos...</div>
    </div>

    <div id="table-container" class="table-wrap" style="display:none">
      <table>
        <thead>
          <tr id="thead-row"></tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <footer>
      <a id="footer-back" href="./">&larr; Voltar &agrave; Calculadora</a>
      <span class="sep">|</span>
      <span>Made by <a href="https://eeriegoesd.com" target="_blank" rel="noopener">EERIE</a></span>
      <span class="sep">|</span>
      <a href="https://buymeacoffee.com/eeriegoesd" target="_blank" rel="noopener">Buy Me a Coffee</a>
    </footer>
  </div>

  <script>
    /* ── Language detection ── */
    function detectLang() {
      const navLangs = [navigator.language, ...(navigator.languages || [])].map(l => (l || '').toLowerCase());
      if (navLangs.some(l => l.startsWith('pt'))) return 'pt';
      try { if (Intl.DateTimeFormat().resolvedOptions().timeZone === 'Europe/Lisbon') return 'pt'; } catch (e) {}
      return 'en';
    }

    const lang = detectLang();

    const t = {
      pageTitle:    { pt: 'Tabela Completa de Raspadinhas', en: 'Full Scratch Tickets Table' },
      pageSubtitle: { pt: 'Valor esperado e probabilidades de todas as raspadinhas portuguesas', en: 'Expected value and probabilities for all Portuguese scratch tickets' },
      taxRate:      { pt: 'Taxa Imposto (%)', en: 'Tax Rate (%)' },
      taxThresh:    { pt: 'Limiar Imposto (\u20ac)', en: 'Tax Threshold (\u20ac)' },
      target:       { pt: '>= Pr\u00e9mio Alvo (\u20ac)', en: '>= Target Prize (\u20ac)' },
      filter:       { pt: 'Filtrar', en: 'Filter' },
      loading:      { pt: 'A carregar dados dos jogos...', en: 'Loading game data...' },
      back:         { pt: '\u2190 Voltar \u00e0 Calculadora', en: '\u2190 Back to Calculator' },
      oddsIn:       { pt: '1 em ', en: '1 in ' },
      name:         { pt: 'Nome', en: 'Name' },
      cost:         { pt: 'Custo', en: 'Cost' },
      topPrize:     { pt: 'Pr\u00e9mio M\u00e1x.', en: 'Top Prize' },
      evPre:        { pt: 'EV Pr\u00e9-Imposto', en: 'EV Pre-Tax' },
      evPost:       { pt: 'EV P\u00f3s-Imposto', en: 'EV Post-Tax' },
      netEV:        { pt: 'EV L\u00edq.', en: 'Net EV' },
      returnPct:    { pt: 'Retorno %', en: 'Return %' },
      oddsAny:      { pt: 'Odds (qualquer)', en: 'Odds (any)' },
      pctFirst:     { pt: '% 1\u00ba Pr\u00e9mio', en: '% 1st Prize' },
      pTarget:      { pt: 'P(\u2265 Alvo)', en: 'P(\u2265 Target)' },
      pTargetEur:   { pt: 'P(\u2265 Alvo)/\u20ac', en: 'P(\u2265 Target)/\u20ac' },
      expCost:      { pt: 'Custo Esperado', en: 'Expected Cost' },
    };

    function tx(key) { return t[key][lang]; }

    /* ── Apply language ── */
    function applyLang() {
      document.documentElement.lang = lang;
      document.title = lang === 'pt'
        ? 'Tabela Completa Raspadinhas | Calculadora EV'
        : 'Full Scratch Tickets Table | EV Calculator';
      document.querySelector('meta[name="description"]').content = lang === 'pt'
        ? 'Tabela completa com o Valor Esperado (EV) de todas as raspadinhas portuguesas. Compare retorno, odds e probabilidades antes e depois de impostos.'
        : 'Full table with Expected Value (EV) for all Portuguese scratch tickets. Compare return, odds and probabilities before and after taxes.';
      document.getElementById('page-title').textContent = tx('pageTitle');
      document.getElementById('page-subtitle').textContent = tx('pageSubtitle');
      document.getElementById('lbl-tax-rate').textContent = tx('taxRate');
      document.getElementById('lbl-tax-thresh').textContent = tx('taxThresh');
      document.getElementById('lbl-target').textContent = tx('target');
      document.getElementById('btn-filter').textContent = tx('filter');
      document.getElementById('loading-text').textContent = tx('loading');
      document.getElementById('footer-back').textContent = tx('back');
    }

    /* ── Columns definition ── */
    const columns = [
      { key: 'name',      label: () => tx('name'),      align: 'left',  fmt: v => v },
      { key: 'cost',      label: () => tx('cost'),      align: 'right', fmt: v => eur(v) },
      { key: 'topPrize',  label: () => tx('topPrize'),  align: 'right', fmt: v => eur(v) },
      { key: 'evPre',     label: () => tx('evPre'),     align: 'right', fmt: v => eur(v) },
      { key: 'evPost',    label: () => tx('evPost'),    align: 'right', fmt: v => eur(v) },
      { key: 'netEV',     label: () => tx('netEV'),     align: 'right', fmt: v => eur(v), color: true },
      { key: 'returnPct', label: () => tx('returnPct'), align: 'right', fmt: v => pct(v), color: true, threshold: 100 },
      { key: 'oddsAny',   label: () => tx('oddsAny'),   align: 'right', fmt: v => odds(v) },
      { key: 'pctFirst',  label: () => tx('pctFirst'),  align: 'right', fmt: v => pctSmall(v) },
      { key: 'pTarget',   label: () => tx('pTarget'),   align: 'right', fmt: v => pctSmall(v) },
      { key: 'pTargetEur',label: () => tx('pTargetEur'),align: 'right', fmt: v => pctSmall(v) },
      { key: 'expCost',   label: () => tx('expCost'),   align: 'right', fmt: v => v === Infinity ? '\u2014' : eur(v) },
    ];

    /* ── Formatters ── */
    function eur(v) {
      return v.toLocaleString('pt-PT', { style: 'currency', currency: 'EUR', minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function pct(v) {
      return v.toLocaleString('pt-PT', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + '%';
    }

    function pctSmall(v) {
      if (v === 0) return '0%';
      if (v < 0.0001) return v.toExponential(2) + '%';
      return v.toLocaleString('pt-PT', { minimumFractionDigits: 4, maximumFractionDigits: 6 }) + '%';
    }

    function odds(v) {
      if (v === Infinity || v === 0) return '\u2014';
      const prefix = lang === 'pt' ? '1 em ' : '1 in ';
      return prefix + v.toLocaleString('pt-PT', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
    }

    /* ── State ── */
    let rawGames = [];
    let computed = [];
    let sortCol = 'netEV';
    let sortDir = -1; // -1 desc, 1 asc

    /* ── Data fetching ── */
    async function loadGames() {
      const indexRes = await fetch('games/index.json');
      const index = await indexRes.json();
      const country = index.countries.find(c => c.code === 'PT');
      if (!country) return [];

      const files = country.scratchTickets || [];
      const promises = files.map(f =>
        fetch('games/' + f).then(r => r.json()).catch(() => null)
      );
      const results = await Promise.all(promises);
      return results.filter(Boolean);
    }

    /* ── Calculation ── */
    function calculate(games) {
      const taxRate = parseFloat(document.getElementById('tax-rate').value) / 100 || 0;
      const taxThresh = parseFloat(document.getElementById('tax-thresh').value) || 0;
      const targetPrize = parseFloat(document.getElementById('target-prize').value) || 0;

      const tax = p => p > taxThresh ? p - ((p - taxThresh) * taxRate) : p;

      return games.map(g => {
        let evPre = 0, evPost = 0, probAny = 0, pTarget = 0, topPrize = 0, topQty = 0;

        g.tiers.forEach(ti => {
          const prob = ti.qty / g.totalTickets;
          evPre += ti.prize * prob;
          evPost += tax(ti.prize) * prob;
          probAny += prob;
          if (ti.prize > topPrize) { topPrize = ti.prize; topQty = ti.qty; }
          if (targetPrize > 0 && ti.prize >= targetPrize) pTarget += prob;
        });

        const netEV = evPost - g.cost;
        const returnPct = (evPost / g.cost) * 100;
        const oddsAny = probAny > 0 ? 1 / probAny : Infinity;
        const pctFirst = topQty > 0 ? (topQty / g.totalTickets) * 100 : 0;
        const pTargetPct = pTarget * 100;
        const pTargetEur = g.cost > 0 ? (pTarget / g.cost) * 100 : 0;
        const expCost = pTarget > 0 ? g.cost / pTarget : Infinity;

        return {
          name: g.name,
          cost: g.cost,
          topPrize,
          evPre,
          evPost,
          netEV,
          returnPct,
          oddsAny,
          pctFirst,
          pTarget: pTargetPct,
          pTargetEur,
          expCost,
        };
      });
    }

    /* ── Sort ── */
    function sortData(data) {
      return [...data].sort((a, b) => {
        let va = a[sortCol], vb = b[sortCol];
        if (typeof va === 'string') {
          return sortDir * va.localeCompare(vb, 'pt');
        }
        if (va === Infinity) va = 1e18;
        if (vb === Infinity) vb = 1e18;
        return sortDir * (va - vb);
      });
    }

    /* ── Render ── */
    function buildHeader() {
      const row = document.getElementById('thead-row');
      row.innerHTML = '';
      columns.forEach(col => {
        const th = document.createElement('th');
        th.style.textAlign = col.align;
        let arrow = '';
        if (sortCol === col.key) {
          arrow = '<span class="sort-arrow">' + (sortDir === 1 ? '\u25B2' : '\u25BC') + '</span>';
        }
        th.innerHTML = col.label() + arrow;
        th.addEventListener('click', () => {
          if (sortCol === col.key) {
            sortDir *= -1;
          } else {
            sortCol = col.key;
            sortDir = col.key === 'name' ? 1 : -1;
          }
          renderTable();
        });
        row.appendChild(th);
      });
    }

    function renderTable() {
      const targetPrize = parseFloat(document.getElementById('target-prize').value) || 0;
      const sorted = sortData(computed);

      // Find best game for target
      let bestIdx = -1;
      if (targetPrize > 0) {
        let bestVal = -1;
        sorted.forEach((r, i) => {
          if (r.pTargetEur > bestVal) { bestVal = r.pTargetEur; bestIdx = i; }
        });
      }

      buildHeader();

      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';

      sorted.forEach((row, i) => {
        const tr = document.createElement('tr');
        if (i === bestIdx) tr.classList.add('highlight');

        columns.forEach(col => {
          const td = document.createElement('td');
          td.style.textAlign = col.align;
          const val = row[col.key];
          td.textContent = col.fmt(val);

          if (col.color) {
            const thresh = col.threshold || 0;
            if (val > thresh) td.classList.add('positive');
            else if (val < thresh) td.classList.add('negative');
          }

          tr.appendChild(td);
        });

        tbody.appendChild(tr);
      });
    }

    /* ── Recalculate ── */
    function recalculate() {
      computed = calculate(rawGames);
      renderTable();
    }

    /* ── CSV Export ── */
    function exportCSV() {
      const targetPrize = parseFloat(document.getElementById('target-prize').value) || 0;
      const sorted = sortData(computed);
      const headers = columns.map(c => c.label());
      const rows = sorted.map(row =>
        columns.map(col => {
          const v = row[col.key];
          if (typeof v === 'string') return '"' + v.replace(/"/g, '""') + '"';
          if (v === Infinity) return '';
          return v.toFixed(6);
        })
      );

      let csv = headers.join(';') + '\n';
      rows.forEach(r => { csv += r.join(';') + '\n'; });

      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'raspadinhas-ev.csv';
      a.click();
      URL.revokeObjectURL(url);
    }

    /* ── Init ── */
    async function init() {
      applyLang();

      try {
        rawGames = await loadGames();
        computed = calculate(rawGames);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('table-container').style.display = '';
        renderTable();
      } catch (e) {
        document.getElementById('loading-text').textContent =
          lang === 'pt' ? 'Erro ao carregar dados.' : 'Error loading data.';
        console.error(e);
      }

      // Live recalculation on input change
      ['tax-rate', 'tax-thresh', 'target-prize'].forEach(id => {
        document.getElementById(id).addEventListener('change', recalculate);
      });
    }

    init();
  </script>
</body>
</html>
