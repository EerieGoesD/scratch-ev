<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tabela Completa de Jogos</title>
<link rel="canonical" href="https://eeriegoesd.com/scratch-ev/tabela-raspadinhas.html">

<meta property="og:title" content="Tabela Completa Raspadinhas | Calculadora EV">
<meta property="og:description" content="Tabela completa com o Valor Esperado de todas as raspadinhas portuguesas.">
<meta property="og:image" content="https://eeriegoesd.com/scratch-ev/og-image.png">
<meta property="og:url" content="https://eeriegoesd.com/scratch-ev/tabela-raspadinhas.html">

<meta property="og:locale" content="pt_PT">
<meta property="og:locale:alternate" content="en_US">

<meta name="twitter:title" content="Tabela Completa Raspadinhas | Calculadora EV">
<meta name="twitter:image" content="https://eeriegoesd.com/scratch-ev/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#ff6b2b;--accent2:#ff9a5c;--text:#e8e8f0;--muted:#8e8eaa;--success:#3de68e;--danger:#ff5555;--mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);padding:32px 24px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E")}
.wrap{max-width:1500px;margin:0 auto;position:relative;z-index:1}
h1{font-size:24px;font-weight:800;color:#fff;margin-bottom:4px}
h1 span{color:var(--accent)}
.sub{font-family:var(--mono);font-size:13px;color:var(--muted);margin-bottom:16px}
.toolbar{display:flex;gap:8px;align-items:stretch;margin-bottom:16px;flex-wrap:wrap}
.tool-box{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 12px;position:relative}
.tool-box label{font-family:var(--mono);font-size:12px;color:var(--muted);white-space:nowrap}
.tool-box input{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:5px 8px;color:var(--text);font-family:var(--mono);font-size:12px;width:100px;outline:none}
.tool-box input:focus{border-color:var(--accent)}
.btn{font-family:var(--mono);font-size:12px;padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--accent);cursor:pointer;transition:all .15s}
.btn:hover{border-color:var(--accent)}
.tip{display:inline-block;width:14px;height:14px;border-radius:50%;border:1px solid var(--border);font-family:var(--mono);font-size:9px;color:var(--muted);text-align:center;line-height:13px;cursor:help;position:relative;flex-shrink:0}
.tip:hover{border-color:var(--accent);color:var(--accent)}
.tip .tiptext{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-family:var(--mono);font-size:12px;color:var(--text);white-space:normal;width:240px;line-height:1.5;z-index:10;pointer-events:none}
.tip:hover .tiptext{display:block}
table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
th{padding:8px 10px;font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:1px;text-transform:uppercase;text-align:left;background:rgba(255,107,43,.04);border-bottom:1px solid var(--border);vertical-align:bottom;cursor:pointer;user-select:none}
th:hover{color:var(--accent2)}
th small{display:block;font-size:9px;color:var(--muted);letter-spacing:0;text-transform:none;font-weight:400;margin-top:2px;white-space:normal}
th .sa{font-size:9px;margin-left:3px;opacity:.5}
td{padding:7px 10px;font-family:var(--mono);font-size:13px;border-bottom:1px solid var(--border);white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.p{color:var(--success)}.n{color:var(--danger)}.hl{background:rgba(61,230,142,.06)}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style></head><body>
<div class="wrap">
<h1 id="title"></h1>
<div class="sub" id="subtitle"></div>
<div class="toolbar">
  <div class="tool-box">
    <button class="btn" onclick="doCSV()" id="csvBtn"></button>
  </div>
  <div class="tool-box">
    <label id="targetLabel"></label>
    <input type="text" id="targetInput" placeholder="" inputmode="decimal" onkeydown="if(event.key==='Enter')recalc()" />
    <button class="btn" onclick="recalc()" id="targetBtn"></button>
  </div>
</div>
<div style="font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6;" id="helpText"></div>
<div style="overflow-x:auto">
<table><thead><tr id="thead"></tr></thead><tbody id="tbody"></tbody></table>
</div>
<div style="margin-top:20px;font-family:var(--mono);font-size:12px;color:var(--muted);text-align:center">
  Made by <a href="https://eeriegoesd.com" target="_blank" style="color:var(--accent);text-decoration:none;font-weight:700">EERIE</a>
  &middot; <a href="https://buymeacoffee.com/eeriegoesd" target="_blank" style="color:var(--accent);text-decoration:none">Buy Me a Coffee</a>
  &middot; <a href="./" style="color:var(--accent);text-decoration:none" id="backLink"></a>
</div>
</div>
<script>
function detectLang() {
  const navLangs = [navigator.language, ...(navigator.languages || [])].map(l => (l||'').toLowerCase());
  if (navLangs.some(l => l.startsWith('pt'))) return 'pt';
  try { if (Intl.DateTimeFormat().resolvedOptions().timeZone === 'Europe/Lisbon') return 'pt'; } catch(e) {}
  return 'en';
}
const isPt = detectLang() === 'pt';
document.documentElement.lang = isPt ? 'pt' : 'en';

const taxRate = 0.2;
const taxThresh = 5000;
const tax = p => p > taxThresh ? p * (1 - taxRate) : p;
const INW = isPt ? 'em' : 'in';
const cols = isPt ? [
  ['name','Nome','Nome do jogo'],
  ['cost','Aposta','Custo do bilhete'],
  ['topPrize','Pr\u00E9mio M\u00E1x.','Maior pr\u00E9mio dispon\u00EDvel'],
  ['evPre','EV Pr\u00E9-Imposto','Valor esperado por bilhete antes de impostos'],
  ['evPost','EV P\u00F3s-Imposto','Valor esperado por bilhete ap\u00F3s impostos'],
  ['netPost','EV L\u00EDq.','EV menos custo do bilhete, ap\u00F3s impostos'],
  ['retPost','Retorno %','Percentagem de retorno ap\u00F3s impostos'],
  ['odds','Prob. (qualquer)','Probabilidade de ganhar qualquer pr\u00E9mio'],
  ['pct1st','% 1\u00BA Pr\u00E9mio','Probabilidade de ganhar o pr\u00E9mio m\u00E1ximo'],
  ['pTarget','P(\u2265 Alvo)','Probabilidade de ganhar \u2265 pr\u00E9mio alvo por bilhete'],
  ['pTargetEur','P(\u2265 Alvo)/\u20AC','Probabilidade por euro gasto'],
  ['costTarget','Custo Esperado','Custo m\u00E9dio para atingir o pr\u00E9mio alvo'],
] : [
  ['name','Name','Name of the game'],
  ['cost','Bet','Ticket cost'],
  ['topPrize','Top Prize','Highest prize available'],
  ['evPre','EV Pre-Tax','Expected value per ticket before taxes'],
  ['evPost','EV Post-Tax','Expected value per ticket after taxes'],
  ['netPost','Net EV','EV minus ticket cost, after taxes'],
  ['retPost','Return %','Return percentage after taxes'],
  ['odds','Odds (any)','Odds of winning any prize'],
  ['pct1st','% 1st Prize','Probability of winning top prize'],
  ['pTarget','P(\u2265 Target)','Probability of winning \u2265 target per ticket'],
  ['pTargetEur','P(\u2265 Target)/\u20AC','Probability per euro spent'],
  ['costTarget','Expected Cost','Average cost to reach target prize'],
];
const colKeys = cols.map(c => c[0]);
let games = [];
let data = [];
let sortCol = -1, sortAsc = true;
let targetPrize = 0;

document.getElementById('csvBtn').textContent = isPt ? 'Exportar Tabela' : 'Export Table';
document.getElementById('targetLabel').textContent = isPt ? 'Pr\u00E9mio Alvo (\u20AC)' : 'Target Prize (\u20AC)';
document.getElementById('targetInput').placeholder = isPt ? 'ex: 10000' : 'e.g. 10000';
document.getElementById('targetBtn').textContent = isPt ? 'Filtrar' : 'Filter';
document.getElementById('helpText').textContent = isPt
  ? 'Introduza um valor no Pr\u00E9mio Alvo para ver qual o jogo com melhor probabilidade de ganhar pelo menos esse montante por euro gasto. O melhor jogo fica destacado a verde.'
  : 'Enter a Target Prize to see which game gives you the best probability of winning at least that amount per euro spent. The best game is highlighted in green.';
document.getElementById('backLink').textContent = isPt ? '\u2190 Voltar \u00E0 Calculadora' : '\u2190 Back to Calculator';
document.title = isPt ? 'Tabela Completa de Jogos' : 'Full Games Table';

function calcData() {
  data = games.map(g => {
    const tot = g.totalTickets;
    let evPre=0, evPost=0, probAny=0, pTarget=0;
    let topPrize=0, topQty=0;
    g.tiers.forEach(ti => {
      const prob = ti.qty / tot;
      evPre += ti.prize * prob;
      evPost += tax(ti.prize) * prob;
      probAny += prob;
      if (ti.prize > topPrize) { topPrize = ti.prize; topQty = ti.qty; }
      if (targetPrize > 0 && ti.prize >= targetPrize) pTarget += prob;
    });
    return {
      name: g.name, cost: g.cost, topPrize, evPre, evPost,
      netPost: evPost - g.cost,
      retPost: (evPost / g.cost) * 100,
      odds: probAny > 0 ? 1 / probAny : Infinity,
      odds1st: topQty > 0 ? tot / topQty : Infinity,
      pct1st: (topQty / tot) * 100,
      pTarget: pTarget * 100,
      pTargetEur: (pTarget / g.cost) * 100,
      costTarget: pTarget > 0 ? g.cost / pTarget : Infinity
    };
  });
}

function recalc() {
  const v = document.getElementById('targetInput').value.trim().replace(/\s/g,'').replace(',','.');
  targetPrize = parseFloat(v) || 0;
  calcData();
  if (targetPrize > 0) {
    sortCol = colKeys.indexOf('pTargetEur');
    sortAsc = false;
    data.sort((a, b) => {
      if (!isFinite(a.pTargetEur) && !isFinite(b.pTargetEur)) return 0;
      if (!isFinite(a.pTargetEur)) return 1;
      if (!isFinite(b.pTargetEur)) return -1;
      return b.pTargetEur - a.pTargetEur;
    });
  }
  render();
}

function sortBy(ci) {
  if (sortCol === ci) sortAsc = !sortAsc;
  else { sortCol = ci; sortAsc = true; }
  const key = colKeys[ci];
  data.sort((a,b) => {
    let va=a[key], vb=b[key];
    if (typeof va==='string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    if (!isFinite(va)) va = sortAsc ? 1e18 : -1e18;
    if (!isFinite(vb)) vb = sortAsc ? 1e18 : -1e18;
    return sortAsc ? va-vb : vb-va;
  });
  render();
}

function render() {
  const f2 = n => isFinite(n) ? n.toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:4})+'\u20AC' : '---';
  const fOdds = v => isFinite(v) ? '1 '+INW+' '+Math.round(v).toLocaleString('pt-PT') : '---';
  document.getElementById('thead').innerHTML = cols.map(([k,h,d],i) =>
    '<th onclick="sortBy('+i+')">'+h+(sortCol===i?'<span class="sa">'+(sortAsc?'\u25B2':'\u25BC')+'</span>':'')+'<small>'+d+'</small></th>'
  ).join('');
  let bestPTE = -1;
  if (targetPrize > 0) data.forEach(r => { if (r.pTargetEur > bestPTE) bestPTE = r.pTargetEur; });
  document.getElementById('tbody').innerHTML = data.map(r => {
    const isBest = targetPrize > 0 && r.pTargetEur === bestPTE && bestPTE > 0;
    return '<tr'+(isBest?' class="hl"':'')+'>' + colKeys.map(k => {
      let v = r[k];
      if (k==='name') return '<td style="font-weight:600;color:#fff">'+v+(isBest?' \u2B50':'')+'</td>';
      if (k==='topPrize') return '<td>'+f2(v)+'</td>';
      if (k==='netPost') return '<td class="'+(v>=0?'p':'n')+'">'+f2(v)+'</td>';
      if (k==='retPost') return '<td class="'+(v>=100?'p':'n')+'">'+v.toFixed(2)+'%</td>';
      if (k==='odds') return '<td>'+fOdds(v)+'</td>';
      if (k==='odds1st') return '<td>'+fOdds(v)+'</td>';
      if (k==='pct1st') return '<td>'+(v>0?v.toFixed(6)+'%':'\u2014')+'</td>';
      if (k==='pTarget') return '<td>'+(targetPrize>0?(v>0?v.toFixed(6)+'%':'\u2014'):'\u2014')+'</td>';
      if (k==='pTargetEur') return '<td>'+(targetPrize>0?(v>0?v.toFixed(6)+'%':'\u2014'):'\u2014')+'</td>';
      if (k==='costTarget') return '<td>'+(targetPrize>0?(isFinite(v)&&v>0?f2(v):'\u2014'):'\u2014')+'</td>';
      return '<td>'+f2(v)+'</td>';
    }).join('') + '</tr>';
  }).join('');
}

function doCSV() {
  let csv = cols.map(c=>c[1]).join(',')+'\n';
  data.forEach(r => {
    csv += colKeys.map(k => { let v=r[k]; if(typeof v==='number') v=+v.toFixed(6); return '"'+v+'"'; }).join(',')+'\n';
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=isPt?'tabela-jogos.csv':'games-table.csv';
  a.click();
}

// Load data from JSON files
fetch('games/index.json')
  .then(r => r.json())
  .then(index => {
    const country = index.countries[0];
    const files = country.scratchTickets || [];
    return Promise.all(files.map(f => fetch('games/' + f).then(r => r.json())));
  })
  .then(loaded => {
    games = loaded;
    const title = isPt ? 'Tabela Completa de Jogos' : 'Full Games Table';
    const subtitle = loaded.length + (isPt
      ? ' jogos \u00B7 Imposto: 20% acima de \u20AC5.000 \u00B7 Clique nos cabe\u00E7alhos para ordenar'
      : ' games \u00B7 Tax: 20% above \u20AC5,000 \u00B7 Click column headers to sort');
    document.getElementById('title').innerHTML = title.replace('Jogos','<span>Jogos</span>').replace('Games','<span>Games</span>');
    document.getElementById('subtitle').textContent = subtitle;
    calcData();
    render();
  });
</script></body></html>
